<div class="container">
  <div class="header">
    <h1>QuickClock</h1>
  </div>

  <div class="time-display">{{ currentTime }}</div>

  <div class="worked-time">
    <span class="label">Arbeitszeit:</span>
    <span class="time">{{ workedTime }}</span>
  </div>

  <div [ngClass]="getStatusClass()">
    {{ getStatusLabel() }}
  </div>

  <div class="buttons">
    <button class="btn-kommen" (click)="recordKommen()">
      <span class="btn-icon">✓</span>
      <span class="btn-text">Kommen</span>
    </button>
    <button class="btn-gehen" (click)="recordGehen()">
      <span class="btn-icon">✗</span>
      <span class="btn-text">Gehen</span>
    </button>
  </div>

  <div class="logs" [scrollTop]="logs.scrollHeight" #logs>
    <ng-container *ngIf="todayLogs.length === 0">
      <div class="empty-state">Noch keine Einträge heute</div>
    </ng-container>

    <ng-container *ngFor="let entry of todayLogs">
      <div [ngClass]="['log-entry', entry.type]">
        <div class="log-info">
          <strong>{{ entry.type === 'kommen' ? '✓ Kommen' : '✗ Gehen' }}</strong>
          <div class="log-time">{{ entry.time }}</div>
        </div>
        <button class="log-delete" (click)="deleteEntry(entry.id)">✕</button>
      </div>
    </ng-container>
  </div>

  <div class="bottom-controls">
    <button class="btn-export" (click)="exportCSV()">📥 Export</button>
    <button class="btn-reset" (click)="resetDay()">🗑 Heute löschen</button>
  </div>
</div>
